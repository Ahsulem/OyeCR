[build]
  base = "/"
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL,NETLIFY_DATABASE_URL,NETLIFY_DATABASE_URL_UNPOOLED"

# Single Page Application SPA Routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200